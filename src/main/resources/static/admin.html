<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理后台 — Jiang I-Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF2F8; --surface: #FFFFFF; --border: #F0E2EF;
    --text: #1E293B; --text2: #64748B; --accent: #EC4899; --accent-light: #F472B6;
    --radius: 12px; --radius-sm: 8px; --red: #EF4444;
    --shadow: 0 4px 24px rgba(30,41,59,.08);
    --font: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *,*::before,*::after { box-sizing:border-box;margin:0;padding:0 }
  body { font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh }
  .nav { background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;gap:20px }
  .nav a { text-decoration:none;font-size:13px;font-weight:600;color:var(--text2);padding:4px 0;border-bottom:2px solid transparent }
  .nav a:hover,.nav a.active { color:var(--accent) }
  .nav a.active { border-bottom-color:var(--accent) }
  .nav .brand { font-weight:800;font-size:16px;color:var(--text);margin-right:auto }
  .container { max-width:800px;margin:40px auto;padding:0 20px }
  .card { background:var(--surface);border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);margin-bottom:20px }
  .card h3 { font-size:16px;font-weight:700;margin-bottom:18px }
  .tabs { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px }
  .tabs button { padding:10px 20px;font-size:13px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s }
  .tabs button:hover,.tabs button.active { color:var(--accent) }
  .tabs button.active { border-bottom-color:var(--accent) }
  table { width:100%;border-collapse:collapse }
  th,td { text-align:left;padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border) }
  th { font-weight:600;color:var(--text2) }
  .badge { display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700 }
  .badge.admin { background:rgba(236,72,153,.1);color:var(--accent) }
  .badge.user { background:rgba(139,92,246,.08);color:#8B5CF6 }
  .btn-sm { padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--red);transition:all .2s }
  .btn-sm:hover { background:var(--red);color:#fff;border-color:var(--red) }
  .btn { padding:10px 24px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s }
  .btn:hover { transform:translateY(-1px);box-shadow:0 4px 14px rgba(236,72,153,.3) }
  .btn:disabled { opacity:.4;cursor:not-allowed;transform:none }
  .btn:focus-visible,.btn-sm:focus-visible,.tabs button:focus-visible { outline:2px solid var(--accent);outline-offset:2px }
  .field { margin-bottom:16px }
  .field label { display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--text2) }
  .field input,.field textarea { width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:border-color .2s;font-family:var(--font) }
  .field textarea { min-height:200px;resize:vertical }
  .field input:focus,.field textarea:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(236,72,153,.1) }
  .row { display:flex;gap:16px }
  .row .field { flex:1 }
  .toast { position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999 }
  .toast.ok { background:#22C55E;color:#fff }
  .toast.error { background:#EF4444;color:#fff }
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">Jiang I-Agent</span>
  <a href="/">对话</a>
  <a href="settings.html">设置</a>
  <a href="admin.html" class="active">管理</a>
  <a href="#" onclick="logout()" style="margin-left:auto">退出</a>
</nav>

<div class="container">
  <div class="card">
    <div class="tabs">
      <button id="tabUsers" class="active" onclick="switchAdminTab('users')">用户管理</button>
      <button id="tabAgent" onclick="switchAdminTab('agent')">Agent 配置</button>
    </div>

    <!-- 用户管理 -->
    <div id="panelUsers">
      <h3>用户列表</h3>
      <table>
        <thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <!-- Agent 配置 -->
    <div id="panelAgent" style="display:none">
      <h3>Agent 全局配置</h3>
      <div class="avatar-area" style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <img class="avatar-preview" id="agentAvatarImg" src="" alt="Agent头像" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:var(--bg)">
        <div>
          <input type="file" id="agentAvatarFile" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" onchange="uploadAgentAvatar()">
          <button class="btn" onclick="document.getElementById('agentAvatarFile').click()" style="font-size:13px;padding:8px 16px;background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:var(--radius-sm);font-weight:600;cursor:pointer">更换 Agent 头像</button>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">JPG/PNG/WebP/GIF，≤2MB</div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="agentName">Agent 名称</label>
          <input id="agentName">
        </div>
        <div class="field">
          <label for="agentModel">模型</label>
          <input id="agentModel">
        </div>
        <div class="field">
          <label for="agentTemp">温度 (0-2)</label>
          <input id="agentTemp" type="number" step="0.1" min="0" max="2">
        </div>
      </div>
      <div class="field">
        <label for="agentPrompt">系统提示词</label>
        <textarea id="agentPrompt"></textarea>
      </div>
      <button class="btn" onclick="saveAgent()">保存配置</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
if (!TOKEN || !USER) { location.href = '/login.html'; }
if (USER.role !== 'ADMIN') { location.href = '/'; }

// ========== Tab ==========
function switchAdminTab(name) {
  document.getElementById('tabUsers').classList.toggle('active', name === 'users');
  document.getElementById('tabAgent').classList.toggle('active', name === 'agent');
  document.getElementById('panelUsers').style.display = name === 'users' ? '' : 'none';
  document.getElementById('panelAgent').style.display = name === 'agent' ? '' : 'none';
  if (name === 'users') loadUsers();
  if (name === 'agent') loadAgentConfig();
}

// ========== Users ==========
function loadUsers() {
  fetch('/api/admin/users?page=1&size=100', authHeaders())
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code !== 200) { showToast(json.message,'error'); return; }
      var rows = (json.data && json.data.records || []).map(function(u){
        return '<tr>' +
          '<td>' + u.id + '</td>' +
          '<td>' + esc(u.username) + '</td>' +
          '<td>' + esc(u.nickname||'') + '</td>' +
          '<td><span class="badge ' + (u.role==='ADMIN'?'admin':'user') + '">' + u.role + '</span></td>' +
          '<td>' + (u.createdAt||'').substring(0,10) + '</td>' +
          '<td><button class="btn-sm" onclick="deleteUser('+u.id+',\''+esc(u.username)+'\')">删除</button></td>' +
        '</tr>';
      }).join('');
      document.getElementById('userTable').innerHTML = rows || '<tr><td colspan="6" style="color:var(--text2)">暂无用户</td></tr>';
    });
}

function deleteUser(id, name) {
  if (!confirm('确定删除用户 "' + name + '" ？此操作不可撤销。')) return;
  fetch('/api/admin/users/' + id, authHeaders({ method:'DELETE' }))
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code === 200) { showToast('已删除'); loadUsers(); }
      else showToast(json.message, 'error');
    });
}

// ========== Agent Config ==========
function uploadAgentAvatar() {
  var file = document.getElementById('agentAvatarFile').files[0];
  if (!file) return;
  var form = new FormData(); form.append('file', file);
  fetch('/api/profile/avatar', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:form })
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code === 200 && json.data && json.data.url) {
        document.getElementById('agentAvatarImg').src = json.data.url;
        showToast('头像已更新，别忘了点保存配置');
      } else showToast(json.message || '上传失败', 'error');
    })
    .catch(function(){ showToast('上传失败', 'error') });
}

function loadAgentConfig() {
  fetch('/api/admin/agent', authHeaders())
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code !== 200) { showToast(json.message,'error'); return; }
      var c = json.data;
      document.getElementById('agentName').value = c.agentName || '';
      document.getElementById('agentAvatarImg').src = c.avatar || '';
      document.getElementById('agentModel').value = c.model || '';
      document.getElementById('agentTemp').value = c.temperature || 0.7;
      document.getElementById('agentPrompt').value = c.systemPrompt || '';
    });
}

function saveAgent() {
  fetch('/api/admin/agent', authHeaders({ method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      agentName: document.getElementById('agentName').value,
      avatar: document.getElementById('agentAvatarImg').src,
      model: document.getElementById('agentModel').value,
      temperature: parseFloat(document.getElementById('agentTemp').value) || 0.7,
      systemPrompt: document.getElementById('agentPrompt').value
    })
  }))
  .then(function(r){ return r.json() })
  .then(function(json){
    if (json.code === 200) showToast('Agent 配置已更新');
    else showToast(json.message, 'error');
  });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadUsers();
</script>
</body>
</html>
