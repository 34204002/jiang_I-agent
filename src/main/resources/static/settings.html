<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人设置 — Jiang I-Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF2F8; --surface: #FFFFFF; --border: #F0E2EF;
    --text: #1E293B; --text2: #64748B; --accent: #EC4899; --accent-light: #F472B6;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(30,41,59,.08);
    --font: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *,*::before,*::after { box-sizing:border-box;margin:0;padding:0 }
  body { font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh }
  .nav { background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;gap:20px }
  .nav a { text-decoration:none;font-size:13px;font-weight:600;color:var(--text2);padding:4px 0;border-bottom:2px solid transparent }
  .nav a:hover,.nav a.active { color:var(--accent) }
  .nav a.active { border-bottom-color:var(--accent) }
  .nav .brand { font-weight:800;font-size:16px;color:var(--text);margin-right:auto }
  .container { max-width:560px;margin:40px auto;padding:0 20px }
  .card { background:var(--surface);border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);margin-bottom:20px }
  .card h3 { font-size:16px;font-weight:700;margin-bottom:18px }
  .field { margin-bottom:16px }
  .field label { display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--text2) }
  .field input { width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:border-color .2s }
  .field input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(236,72,153,.1) }
  .btn {
    padding:10px 24px;border:none;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,var(--accent),var(--accent-light));
    color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s
  }
  .btn:hover { transform:translateY(-1px);box-shadow:0 4px 14px rgba(236,72,153,.3) }
  .btn:disabled { opacity:.4;cursor:not-allowed;transform:none }
  .btn:focus-visible,.btn-outline:focus-visible { outline:2px solid var(--accent);outline-offset:2px }
  .btn-outline { background:transparent;color:var(--accent);border:1.5px solid var(--accent);font-weight:600 }
  .btn-outline:hover { background:rgba(236,72,153,.06) }
  .avatar-area { display:flex;align-items:center;gap:16px;margin-bottom:16px }
  .avatar-preview { width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:var(--bg) }
  .toast { position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999 }
  .toast.ok { background:#22C55E;color:#fff }
  .toast.error { background:#EF4444;color:#fff }
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">Jiang I-Agent</span>
  <a href="/">对话</a>
  <a href="settings.html" class="active">设置</a>
  <a href="admin.html" id="adminLink" style="display:none">管理</a>
  <a href="#" onclick="logout()" style="margin-left:auto">退出</a>
</nav>

<div class="container">
  <div class="card">
    <h3>个人资料</h3>
    <div class="avatar-area">
      <img class="avatar-preview" id="avatarImg" src="" alt="头像">
      <div>
        <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" onchange="uploadAvatar()">
        <button class="btn btn-outline" onclick="document.getElementById('avatarFile').click()" style="font-size:13px;padding:8px 16px">更换头像</button>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">JPG/PNG/WebP/GIF，≤2MB</div>
      </div>
    </div>

    <div class="field">
      <label for="username">用户名</label>
      <input id="username" disabled style="opacity:.5">
    </div>
    <div class="field">
      <label for="nickname">昵称</label>
      <input id="nickname" placeholder="给自己取个名字">
    </div>
    <div class="field">
      <label for="role">角色</label>
      <input id="role" disabled style="opacity:.5">
    </div>

    <button class="btn" onclick="saveProfile()">保存</button>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
var TOKEN = localStorage.getItem('token');
var USER  = JSON.parse(localStorage.getItem('user') || 'null');
if (!TOKEN || !USER) { location.href = '/login.html'; }

function loadProfile() {
  fetch('/api/user/me', authHeaders())
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code === 200) {
        var u = json.data;
        document.getElementById('username').value = u.username;
        document.getElementById('nickname').value = u.nickname || '';
        document.getElementById('role').value = u.role;
        document.getElementById('avatarImg').src = u.avatar || '';
        localStorage.setItem('user', JSON.stringify(u));
      }
    });
}

function uploadAvatar() {
  var file = document.getElementById('avatarFile').files[0];
  if (!file) return;
  var form = new FormData(); form.append('file', file);
  fetch('/api/profile/avatar', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:form })
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code === 200 && json.data && json.data.url) {
        document.getElementById('avatarImg').src = json.data.url;
        // 同步更新头像字段
        fetch('/api/user/me', authHeaders({ method:'PUT',
          headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
          body: JSON.stringify({ avatar: json.data.url }) }));
        showToast('头像已更新');
      } else {
        showToast(json.message || '上传失败', 'error');
      }
    })
    .catch(function(){ showToast('上传失败', 'error') });
}

function saveProfile() {
  var nickname = document.getElementById('nickname').value.trim();
  if (!nickname) { showToast('昵称不能为空','error'); return; }
  fetch('/api/user/me', authHeaders({ method:'PUT',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body: JSON.stringify({ nickname: nickname }) }))
    .then(function(r){ return r.json() })
    .then(function(json){
      if (json.code === 200) {
        showToast('保存成功');
        var u = json.data;
        localStorage.setItem('user', JSON.stringify(u));
        document.getElementById('role').value = u.role;
      } else {
        showToast(json.message || '保存失败', 'error');
      }
    });
}

loadProfile();
if (USER && USER.role === 'ADMIN') {
  document.getElementById('adminLink').style.display = '';
}
</script>
</body>
</html>
