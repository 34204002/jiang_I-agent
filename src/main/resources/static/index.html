<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Jiang I-Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
  <!-- ========== Sidebar ========== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="icon">⚡</div>
      <div>
        <div class="name">Jiang I-Agent</div>
        <div class="ver">DeepSeek V3.2 · 在线</div>
      </div>
    </div>

    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-loading"><span class="spinner"></span>加载中…</div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-new" onclick="onNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
    </div>
  </aside>

  <!-- ========== Main Area ========== -->
  <main class="main">
    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="chat" onclick="switchTab('chat')">
        <span class="dot"></span>对话
      </button>
      <button class="tab" data-tab="knowledge" onclick="switchTab('knowledge')">
        <span class="dot"></span>知识库
      </button>
      <button class="tab" data-tab="graph" onclick="switchTab('graph')">
        <span class="dot"></span>图谱
      </button>
      <button class="tab" data-tab="tools" onclick="switchTab('tools')">
        <span class="dot"></span>工具
      </button>
    </nav>

    <!-- Chat body -->
    <div class="chat-body" id="chatBody">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">🧠</div>
        <h2>Jiang I-Agent</h2>
        <p>你的个人 AI 知识库助手。支持文档问答、代码答疑、知识图谱检索，具备工具调用与待办管理能力。</p>
        <div class="welcome-cards">
          <button class="welcome-card" onclick="sendHint('帮我记一下明天下午3点面试')">📋 新建待办</button>
          <button class="welcome-card" onclick="sendHint('用Java写一个快速排序')">💻 代码问答</button>
          <button class="welcome-card" onclick="sendHint('解释一下 RAG 检索增强生成的原理')">📚 知识检索</button>
          <button class="welcome-card" onclick="sendHint('什么是Java中的CompletableFuture')">☕ 八股答疑</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area" id="inputArea">
      <div class="input-row">
        <textarea id="msgInput" rows="1" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)"
          onkeydown="onInputKey(event)" oninput="autoGrow(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="onSend()" title="发送 (Enter)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-footnote">Jiang I-Agent · 响应可能调用工具</div>
    </div>
  </main>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="/js/app.js"></script>
</body>
</html>
