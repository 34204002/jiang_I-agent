# =============================================================================
# Jiang I-Agent — 主配置（Key 占位，实际值在 profile 中填写）
# =============================================================================

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expire-days: ${APP_JWT_EXPIRE_DAYS:7}

spring:
  application:
    name: jiang_I-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==================== MySQL ====================
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB}

  # ==================== Neo4j ====================
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}

  # ==================== Spring AI ====================
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL}
      chat:
        model: ${AI_MODEL}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL}

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST}
        port: ${QDRANT_PORT}
        collection-name: ${QDRANT_COLLECTION:jiang_i_agent_knowledge}

  # ==================== 阿里云 OSS ====================
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
